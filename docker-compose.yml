version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nutraflow-web:latest
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - USE_WHATSAPP_WORKER=1
      - WHATSAPP_WORKER_URL=http://worker:3333
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: nutraflow-whatsapp-worker:latest
    ports:
      - '3333:3333'
    env_file:
      - .env.local
    environment:
      - USE_WHATSAPP_WORKER=1
    restart: unless-stopped
